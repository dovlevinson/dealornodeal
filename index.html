<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moriah Lions - Deal or No Deal</title>
  
  <!-- Tailwind CSS for styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React and ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel to compile JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#051124] m-0 p-0 overflow-hidden font-sans">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- ICONS (Replacing lucide-react for standalone HTML usage) ---
    const RefreshCw = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;
    const Play = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="6 3 20 12 6 21 6 3"/></svg>;
    const Undo = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>;
    const Settings = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>;
    const Zap = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>;

    // The exact 10 requested prizes in the exact tracker order
    const DEFAULT_PRIZES = [
      "Penny",              // 0
      "Pencil",             // 1
      "$1 Snack Closet",    // 2
      "Logo Day",           // 3
      "1 Hour Late Start",  // 4
      "Ice Cream Truck",    // 5
      "Chickies Lunch",     // 6
      "Movie Day",          // 7
      "Bake Tour",          // 8 (Rigged to be the winner / secret anagram!)
      "Free Snow Day"       // 9 
    ];

    // Anagram Mapping: BAKE TOUR -> BREAKOUT
    const ANAGRAM_DATA = [
      { id: 'B', char: 'B', startI: 0, endI: 0 },
      { id: 'A', char: 'A', startI: 1, endI: 3 },
      { id: 'K', char: 'K', startI: 2, endI: 4 },
      { id: 'E', char: 'E', startI: 3, endI: 2 },
      { id: 'T', char: 'T', startI: 5, endI: 7 }, 
      { id: 'O', char: 'O', startI: 6, endI: 5 },
      { id: 'U', char: 'U', startI: 7, endI: 6 },
      { id: 'R', char: 'R', startI: 8, endI: 1 },
    ];

    function App() {
      // --- INITIALIZATION ---
      const INITIAL_PRIZES = [0, 1, 2, 3, 4, 5, 6, 9, 8, 7]; // Snow Day at 7 (bottom middle)
      
      const getInitialCases = () => INITIAL_PRIZES.map((prizeId, index) => ({
        uid: index, 
        slot: index, 
        id: null, 
        prizeId: prizeId, 
        opened: false
      }));

      const getInitialPrizes = () => DEFAULT_PRIZES.map((text, index) => ({
        id: index,
        text: text,
        eliminated: false
      }));

      // --- STATE ---
      const [gameState, setGameState] = useState('hover_tease'); // Boots straight into game
      const [prizes, setPrizes] = useState(getInitialPrizes()); 
      const [cases, setCases] = useState(getInitialCases()); 
      const [playerCase, setPlayerCase] = useState(null);
      const [hoveredUid, setHoveredUid] = useState(null); 
      const [revealingCase, setRevealingCase] = useState(null);
      const [wonPrize, setWonPrize] = useState(null);
      const [revealStep, setRevealStep] = useState('focus'); // focus -> animating -> board
      const [eliminatedHistory, setEliminatedHistory] = useState([]);
      
      const [pendingSwapAction, setPendingSwapAction] = useState(null); // 'keep', 'swap', or null

      // History for the Undo Button
      const [history, setHistory] = useState([]);

      // start -> animating -> done
      const [anagramPhase, setAnagramPhase] = useState('start'); 

      const showSideBoards = ['playing', 'revealing', 'pre_swap_board', 'swap_offer', 'reveal_loser', 'pre_final_board', 'game_over'].includes(gameState);

      const remainingCase = cases.find(c => !c.opened && c.id !== playerCase);

      // --- HISTORY & UNDO LOGIC ---
      const saveStateToHistory = () => {
        // We strictly deep-clone the objects so mutations don't corrupt the history!
        setHistory(prev => [...prev, {
          gameState, 
          prizes: prizes.map(p => ({ ...p })), 
          cases: cases.map(c => ({ ...c })), 
          playerCase, 
          revealingCase: revealingCase ? { ...revealingCase } : null, 
          revealStep, 
          wonPrize, 
          anagramPhase, 
          pendingSwapAction,
          eliminatedHistory: eliminatedHistory.map(h => ({ ...h }))
        }]);
      };

      const undo = () => {
        setHistory(prev => {
          if (prev.length === 0) return prev;
          const newHistory = [...prev];
          const lastState = newHistory.pop();
          
          setGameState(lastState.gameState);
          setCases(lastState.cases.map(c => ({ ...c })));
          setPrizes(lastState.prizes.map(p => ({ ...p })));
          setEliminatedHistory(lastState.eliminatedHistory.map(h => ({ ...h })));
          setPlayerCase(lastState.playerCase);
          setRevealingCase(lastState.revealingCase ? { ...lastState.revealingCase } : null);
          setRevealStep(lastState.revealStep);
          setWonPrize(lastState.wonPrize);
          setAnagramPhase(lastState.anagramPhase);
          setPendingSwapAction(lastState.pendingSwapAction || null);
          
          return newHistory;
        });
      };

      const resetGame = () => {
        setGameState('hover_tease');
        setPrizes(getInitialPrizes());
        setCases(getInitialCases());
        setPlayerCase(null);
        setHoveredUid(null);
        setRevealingCase(null);
        setWonPrize(null);
        setRevealStep('focus');
        setEliminatedHistory([]);
        setPendingSwapAction(null);
        setHistory([]);
        setAnagramPhase('start');
      };

      // --- DRAMATIC REVEAL TIMER ---
      useEffect(() => {
        let timer;
        if (revealStep === 'animating') {
          if (gameState === 'final_revealing') {
            timer = setTimeout(() => handleFinalOpen(), 2500);
          } else {
            timer = setTimeout(() => setRevealStep('board'), 2500);
          }
        }
        return () => clearTimeout(timer);
      }, [revealStep, gameState]);

      // --- THE INVISIBLE TRIGGER ---
      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.code === 'Space' || e.code === 'Enter' || e.code === 'ArrowRight' || e.code === 'PageDown') {
            if (gameState === 'game_over' && wonPrize === 'Bake Tour') {
              e.preventDefault(); 
              setGameState('anagram');
              setAnagramPhase('start');
            } else if (gameState === 'anagram' && anagramPhase === 'start') {
              e.preventDefault();
              setAnagramPhase('animating');
              setTimeout(() => setAnagramPhase('done'), 2000);
            }
          }
        };
        
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [gameState, wonPrize, anagramPhase]);

      // --- AUTOMATIC ANAGRAM TRIGGER ---
      useEffect(() => {
        if (gameState === 'anagram' && anagramPhase === 'start') {
          const t1 = setTimeout(() => setAnagramPhase('animating'), 50);
          const t2 = setTimeout(() => setAnagramPhase('done'), 2050);
          return () => { clearTimeout(t1); clearTimeout(t2); };
        }
      }, [gameState, anagramPhase]);

      // --- TRUE VISUAL SHUFFLE ANIMATION ---
      useEffect(() => {
        let t3, interval;
        
        if (gameState === 'tease_shuffle') {
          let count = 0;
          interval = setInterval(() => {
            count++;
            
            setCases((prev) => {
              const newCases = [...prev];
              const slots = newCases.map(c => c.slot);
              for (let i = slots.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [slots[i], slots[j]] = [slots[j], slots[i]];
              }
              return newCases.map((c, idx) => ({ ...c, slot: slots[idx] }));
            });
            
            if (count >= 6) { 
              clearInterval(interval);
              t3 = setTimeout(() => setGameState('assign_numbers'), 900);
            }
          }, 900); 
        } 
        else if (gameState === 'assign_numbers') {
          setCases((prev) => {
            let numberedCases = prev.map((c) => ({ ...c, id: c.slot + 1 }));
            return numberedCases.sort((a, b) => a.id - b.id);
          });
          setGameState('pick_own');
        }

        return () => {
          clearTimeout(t3);
          clearInterval(interval);
        };
      }, [gameState]);

      const handleCaseClick = (caseId) => {
        saveStateToHistory();

        if (gameState === 'pick_own') {
          setPlayerCase(caseId);
          setGameState('playing');
        } else if (gameState === 'playing') {
          let currentCases = [...cases];
          const clickedCaseIndex = currentCases.findIndex(c => c.id === caseId);
          let clickedCase = currentCases[clickedCaseIndex];

          if (clickedCase.opened || caseId === playerCase) {
            setHistory(prev => prev.slice(0, -1));
            return;
          }

          // --- DYNAMIC RIGGING ENGINE ---
          const TURN_ORDER = [4, 3, 0, 7, 6, 2, 9, 5]; 
          const turnIndex = currentCases.filter(c => c.opened).length; 
          
          if (turnIndex < 8) {
            const targetPrizeId = TURN_ORDER[turnIndex];
            const caseWithTargetIndex = currentCases.findIndex(c => c.prizeId === targetPrizeId);
            
            if (caseWithTargetIndex !== -1 && currentCases[caseWithTargetIndex].id !== clickedCase.id) {
              const tempPrizeId = clickedCase.prizeId;
              currentCases[clickedCaseIndex] = { ...currentCases[clickedCaseIndex], prizeId: targetPrizeId };
              currentCases[caseWithTargetIndex] = { ...currentCases[caseWithTargetIndex], prizeId: tempPrizeId };
              
              clickedCase = currentCases[clickedCaseIndex];
              setCases(currentCases);
            }
          }

          setRevealingCase(clickedCase);
          setRevealStep('focus');
          setGameState('revealing');
        }
      };

      const executeReveal = () => {
        saveStateToHistory();
        const caseId = revealingCase.id;
        const updatedCases = cases.map(c => c.id === caseId ? { ...c, opened: true } : c);
        setCases(updatedCases);

        const updatedPrizes = prizes.map(p => p.id === revealingCase.prizeId ? { ...p, eliminated: true } : p);
        setPrizes(updatedPrizes);

        const revealedPrize = prizes.find(p => p.id === revealingCase.prizeId);
        setEliminatedHistory(prev => [...prev, revealedPrize]);

        setRevealingCase(null);

        const unopenedCount = updatedCases.filter(c => !c.opened).length;
        
        if (unopenedCount === 2) {
          setGameState('pre_swap_board');
        } else {
          setGameState('playing');
        }
      };

      const handleKeepCase = () => {
        saveStateToHistory();
        const pCase = cases.find(c => c.id === playerCase);
        const oCase = cases.find(c => !c.opened && c.id !== playerCase);
        
        const updatedCases = cases.map(c => {
          if (c.id === pCase.id) return { ...c, prizeId: 8 };
          if (c.id === oCase.id) return { ...c, prizeId: 1 };
          return c;
        });
        setCases(updatedCases);
        
        setRevealingCase(updatedCases.find(c => c.id === oCase.id)); 
        setRevealStep('focus');
        setGameState('reveal_loser');
      };

      const handleSwapCase = () => {
        saveStateToHistory();
        const pCase = cases.find(c => c.id === playerCase);
        const oCase = cases.find(c => !c.opened && c.id !== playerCase);
        
        const updatedCases = cases.map(c => {
          if (c.id === oCase.id) return { ...c, prizeId: 8 };
          if (c.id === pCase.id) return { ...c, prizeId: 1 };
          return c;
        });
        setCases(updatedCases);
        
        setPlayerCase(oCase.id); 
        setRevealingCase(updatedCases.find(c => c.id === pCase.id)); 
        setRevealStep('focus');
        setGameState('reveal_loser');
      };

      const executeLoserReveal = () => {
        saveStateToHistory();
        const caseId = revealingCase.id;
        const updatedCases = cases.map(c => c.id === caseId ? { ...c, opened: true } : c);
        setCases(updatedCases);

        const updatedPrizes = prizes.map(p => p.id === revealingCase.prizeId ? { ...p, eliminated: true } : p);
        setPrizes(updatedPrizes);

        const revealedPrize = prizes.find(p => p.id === revealingCase.prizeId);
        setEliminatedHistory(prev => [...prev, revealedPrize]);

        setRevealingCase(updatedCases.find(c => c.id === playerCase));
        setGameState('pre_final_board');
      };

      const handleFinalOpen = () => {
        saveStateToHistory();
        const myCase = cases.find(c => c.id === playerCase);
        const wonPrizeObj = prizes.find(p => p.id === myCase.prizeId);
        
        setWonPrize(wonPrizeObj.text);
        setCases(cases.map(c => ({ ...c, opened: true }))); 
        setPrizes(prizes.map(p => ({ ...p, eliminated: true }))); 
        setGameState('game_over'); 
      };

      const renderPrizeBoard = (side) => {
        const startIdx = side === 'left' ? 0 : 5;
        const endIdx = side === 'left' ? 5 : 10;
        const boardPrizes = prizes.slice(startIdx, endIdx);

        return (
          <div className="flex flex-col justify-between w-full h-full px-1 py-1 min-h-0">
            {side === 'left' && <div className="text-center text-gray-400 font-black font-sans text-xs sm:text-sm md:text-base tracking-widest uppercase mb-1 sm:mb-2 drop-shadow-md">Worst</div>}
            {side === 'right' && <div className="text-center text-transparent text-xs sm:text-sm md:text-base tracking-widest uppercase mb-1 sm:mb-2 drop-shadow-md select-none">Placeholder</div>}
            
            <div className="flex flex-col justify-between w-full h-full gap-1 sm:gap-2 md:gap-3 flex-1 min-h-0">
              {boardPrizes.map((prize) => {
                const isBlank = !prize.eliminated;
                return (
                  <div 
                    key={prize.id}
                    className={`
                      flex-1 flex items-center justify-center px-1 sm:px-3 py-1 min-h-[30px] sm:min-h-[40px] border-[2px] md:border-[3px] rounded-md text-center font-black font-sans transition-all duration-300 relative overflow-hidden
                      ${isBlank 
                        ? 'bg-[#0f2a4a]/40 border-[#1e40af]/30 shadow-[inset_0_0_10px_rgba(0,0,0,0.5)] text-[#facc15]/20' 
                        : 'bg-[#110000] text-red-500 border-red-800 shadow-[inset_0_0_20px_rgba(0,0,0,1)] opacity-100'}
                    `}
                  >
                    {isBlank ? (
                      <span className="text-xl md:text-3xl font-black font-sans">?</span>
                    ) : (
                      <div className="w-full uppercase tracking-wider relative z-10 px-1 text-[10px] sm:text-[11px] md:text-[13px] lg:text-sm xl:text-base break-words whitespace-normal leading-tight flex items-center justify-center font-sans font-black">
                        {prize.text}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            {side === 'right' && <div className="text-center text-yellow-400 font-black font-sans text-xs sm:text-sm md:text-base tracking-widest uppercase mt-1 sm:mt-2 drop-shadow-md">Best</div>}
            {side === 'left' && <div className="text-center text-transparent text-xs sm:text-sm md:text-base tracking-widest uppercase mt-1 sm:mt-2 drop-shadow-md select-none">Placeholder</div>}
          </div>
        );
      };

      const renderCase = (c, isBig = false, isGiant = false) => {
        const isPlayerCase = c.id === playerCase;
        const isHidden = !isBig && !isGiant && (c.opened || (isPlayerCase && gameState !== 'hover_tease' && gameState !== 'tease_shuffle' && gameState !== 'assign_numbers'));

        const isGridCase = !isBig && !isGiant;
        
        // Completely unblocked 'Bake Tour' so you can peek at it during hover
        const isPeeking = gameState === 'hover_tease' && hoveredUid === c.uid && isGridCase;
        const myPrize = prizes.find(p => p.id === c.prizeId);

        // Giant cases are fully clickable to resolve the un-clickable modal issue
        const isClickable = (() => {
          if (isHidden) return false;
          if (isGiant) return true; 
          if (gameState === 'swap_offer') return isPlayerCase || c.id === remainingCase?.id;
          if (isGridCase) return ['pick_own', 'playing', 'hover_tease'].includes(gameState);
          return false;
        })();

        const dims = isGiant 
          ? "w-[260px] sm:w-[320px] md:w-[400px]" 
          : isBig 
            ? "w-[120px] sm:w-[150px] md:w-[180px]" 
            : "w-[90%] sm:w-[85%] md:w-[80%] max-w-[240px]"; 

        const caseContent = (
          <button
            onClick={() => {
              if (!isClickable) return;
              if (gameState === 'pre_final_board') {
                saveStateToHistory();
                setGameState('final_revealing');
                setRevealStep('animating');
              } else if (gameState === 'revealing' || gameState === 'reveal_loser') {
                if (revealStep === 'focus') {
                  saveStateToHistory();
                  setRevealStep('animating');
                }
              } else if (gameState === 'swap_offer') {
                setPendingSwapAction(isPlayerCase ? 'keep' : 'swap');
              } else if (isGridCase && c.id) {
                handleCaseClick(c.id);
              }
            }}
            onMouseEnter={() => gameState === 'hover_tease' && setHoveredUid(c.uid)}
            onMouseLeave={() => gameState === 'hover_tease' && setHoveredUid(null)}
            disabled={!isClickable}
            className={`
              relative flex flex-col items-center justify-end aspect-[4/3] ${dims}
              transition-transform duration-200 ease-out
              ${(isClickable && (isGiant || c.id || gameState === 'hover_tease')) ? 'hover:scale-105 hover:-translate-y-1 cursor-pointer' : ''}
              drop-shadow-[0_15px_20px_rgba(0,0,0,0.9)]
            `}
          >
            {/* THE METALLIC HANDLE */}
            <div className="absolute -top-[15%] w-[35%] h-[25%] bg-transparent border-t-[4px] border-x-[4px] md:border-t-[8px] md:border-x-[8px] border-[#a1a1aa] rounded-t-lg z-0 shadow-[inset_0_2px_4px_rgba(255,255,255,0.9),0_4px_8px_rgba(0,0,0,0.9)]">
               <div className="absolute inset-0 bg-gradient-to-b from-white/60 to-transparent"></div>
            </div>
            
            {/* THE MAIN CASE BODY */}
            <div className="relative w-full h-full rounded-md md:rounded-lg border-[3px] md:border-[4px] border-[#ffffff] overflow-hidden shadow-[inset_0_-10px_20px_rgba(0,0,0,0.8),inset_0_2px_15px_rgba(255,255,255,1)] z-10 flex items-center justify-center"
                 style={{ background: 'repeating-linear-gradient(to bottom, #f4f4f5, #f4f4f5 2px, #d4d4d8 4px, #d4d4d8 6px)' }}>
              
              <div className="absolute top-0 bottom-0 left-0 w-2 md:w-5 bg-gradient-to-r from-white/90 to-transparent pointer-events-none"></div>
              <div className="absolute top-0 bottom-0 right-0 w-2 md:w-5 bg-gradient-to-l from-black/60 to-transparent pointer-events-none"></div>
              <div className="absolute bottom-0 left-0 right-0 h-2 md:h-5 bg-gradient-to-t from-black/70 to-transparent pointer-events-none"></div>

              <div className="absolute top-0 left-0 w-2 h-2 md:w-4 md:h-4 bg-[#666] rounded-br-sm shadow-inner z-20"></div>
              <div className="absolute top-0 right-0 w-2 h-2 md:w-4 md:h-4 bg-[#444] rounded-bl-sm shadow-inner z-20"></div>
              <div className="absolute bottom-0 left-0 w-2 h-2 md:w-4 md:h-4 bg-[#333] rounded-tr-sm shadow-inner z-20"></div>
              <div className="absolute bottom-0 right-0 w-2 h-2 md:w-4 md:h-4 bg-[#111] rounded-tl-sm shadow-inner z-20"></div>

              {/* CASE INTERIOR (Visible during Tease) */}
              {isPeeking ? (
                <div className="absolute inset-[6%] bg-gradient-to-br from-white to-gray-200 border-[2px] md:border-[4px] border-yellow-400 rounded-md flex items-center justify-center p-2 z-30 shadow-[inset_0_0_20px_rgba(0,0,0,0.2),0_0_30px_rgba(255,255,255,1)] overflow-hidden">
                  <span className="w-full text-[#0f2a4a] font-sans font-black text-center uppercase leading-tight tracking-normal break-words whitespace-normal text-xs sm:text-sm md:text-lg lg:text-xl xl:text-2xl px-1">
                    {myPrize?.text}
                  </span>
                </div>
              ) : (
                /* THE NUMBER PLATE (Blank during Tease Closed) */
                <div className={`
                  relative bg-gradient-to-br from-[#0f2a4a] to-[#051124] text-[#facc15] font-sans font-black flex items-center justify-center rounded-lg border-[2px] md:border-[4px] border-[#1e40af] shadow-[0_5px_15px_rgba(0,0,0,1),inset_0_0_15px_rgba(0,0,0,0.8)] z-20
                  ${isGiant ? 'w-[50%] h-[40%] text-[4rem] md:text-[6rem]' : isBig ? 'w-[50%] h-[40%] text-3xl sm:text-5xl md:text-6xl' : 'w-[50%] h-[40%] text-2xl sm:text-4xl md:text-5xl'}
                `}>
                  <span className={`tracking-normal relative z-10 leading-none transition-opacity duration-300 ${!c.id ? 'opacity-0' : 'opacity-100'}`} style={{ textShadow: '0 2px 4px rgba(0,0,0,0.8)' }}>
                    {c.id || 'X'}
                  </span>

                <div className="w-full max-w-5xl px-4 md:px-12 py-12 md:py-24 bg-gradient-to-b from-yellow-300 to-yellow-600 border-[6px] md:border-[12px] border-white flex justify-center items-center shadow-[0_0_150px_rgba(250,204,21,0.6)] relative overflow-hidden rounded-2xl h-[200px] sm:h-[300px] md:h-[400px] animate-[slowReveal_1s_ease-out_forwards]">
                   <div className="absolute top-0 left-0 right-0 h-[30%] bg-gradient-to-b from-white/60 to-transparent"></div>
                   <h1 className="text-[3rem] sm:text-[5rem] md:text-[7rem] lg:text-[9rem] leading-none font-black font-sans text-[#0f2a4a] uppercase tracking-tight break-words relative z-10 whitespace-nowrap">
                     {wonPrize}
                   </h1>
                </div>
              </div>
            </div>
          )}

          {/* FINAL ANAGRAM MODAL */}
          {gameState === 'anagram' && (
            <div 
              className="fixed inset-0 bg-[#051124]/95 flex items-center justify-center z-50 p-4 overflow-hidden cursor-pointer"
              onClick={() => {
                 if (anagramPhase === 'done') setGameState('breakout');
              }}
            >
              <div className="flex flex-col items-center w-full text-center pointer-events-none">
                
                <img 
                  src="Moriah Lions Logo WORDS ONLY 123-293-K.png" 
                  alt="Moriah Lions" 
                  className={`h-16 sm:h-24 md:h-32 mb-6 drop-shadow-[0_0_15px_rgba(250,204,21,0.3)] object-contain transition-opacity duration-1000 ${anagramPhase !== 'start' ? 'opacity-0' : 'opacity-100'}`}
                  onError={(e) => e.target.style.display = 'none'} 
                />

                <div className={`text-2xl sm:text-4xl md:text-5xl font-black font-sans text-yellow-400 mb-4 sm:mb-6 uppercase tracking-widest transition-opacity duration-1000 ${anagramPhase !== 'start' ? 'opacity-0' : 'opacity-100'}`}>
                  CONGRATULATIONS!
                </div>
                
                <div className={`text-xl sm:text-2xl md:text-3xl font-black font-sans text-blue-200 mb-6 uppercase tracking-widest transition-opacity duration-1000 ${anagramPhase !== 'start' ? 'opacity-0' : 'opacity-100'}`}>
                  YOU HAVE WON!
                </div>
                
                <div className="w-full max-w-5xl px-4 md:px-12 py-12 md:py-24 bg-gradient-to-b from-yellow-300 to-yellow-600 border-[6px] md:border-[12px] border-white flex justify-center items-center shadow-[0_0_150px_rgba(250,204,21,0.8)] relative overflow-hidden rounded-2xl h-[200px] sm:h-[300px] md:h-[400px] flex-col">
                   <div className="absolute top-0 left-0 right-0 h-[30%] bg-gradient-to-b from-white/60 to-transparent"></div>
                   
                   <div className={`relative w-full h-[4rem] sm:h-[6rem] md:h-[8rem] lg:h-[10rem] flex items-center z-10 mx-auto px-2 sm:px-4`}>
                      {ANAGRAM_DATA.map(letter => {
                        const isStart = anagramPhase === 'start';
                        const leftPos = isStart ? `${(letter.startI / 9) * 100}%` : `${(letter.endI / 8) * 100}%`;
                        const width = isStart ? `${100 / 9}%` : `${100 / 8}%`;
                        const rotate = isStart ? 'rotate(0deg)' : 'rotate(360deg)';
                        
                        return (
                          <div
                            key={letter.id}
                            className="absolute top-0 bottom-0 flex justify-center items-center font-black font-sans text-[#0f2a4a] uppercase"
                            style={{
                              left: leftPos,
                              width: width,
                              transform: rotate,
                              transition: 'all 2000ms cubic-bezier(0.68, -0.55, 0.265, 1.55)'
                            }}
                          >
                            <span className="text-[3rem] sm:text-[5rem] md:text-[7rem] lg:text-[9rem] tracking-tight leading-none drop-shadow-sm whitespace-nowrap">
                              {letter.char}
                            </span>
                          </div>
                        )
                      })}
                   </div>

                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
